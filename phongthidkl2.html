<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tra cứu phòng thi DK (THPT VY1)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at 20% 30%, #667eea, transparent 40%),
                radial-gradient(circle at 80% 70%, #764ba2, transparent 40%),
                #0f172a;
    overflow-x: hidden;
    padding: 20px;
}

.container{
    width:100%;
    max-width:900px;
    padding:50px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 40px 80px rgba(0,0,0,0.6);
    color:white;
    animation: fadeIn 0.8s ease;
}

h1{
    text-align:center;
    font-size:30px;
    margin-bottom:35px;
    font-weight:700;
    letter-spacing:1px;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:35px;
    flex-wrap: wrap;
}

.input-wrapper{
    position:relative;
    flex: 1;
    min-width: 200px;
}

.input-wrapper i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    opacity:0.6;
}

input{
    padding:14px 14px 14px 40px;
    width:100%;
    border-radius:14px;
    border:none;
    outline:none;
    font-size:16px;
    background:rgba(255,255,255,0.1);
    color:white;
    transition:0.3s;
}

input::placeholder{
    color:rgba(255,255,255,0.6);
}

input:focus{
    background:rgba(255,255,255,0.2);
    box-shadow:0 0 20px #8b5cf6;
}

button{
    padding:14px 28px;
    border-radius:14px;
    border:none;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    color:white;
    font-size:15px;
    transition:0.3s;
    position:relative;
    overflow:hidden;
    white-space: nowrap;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(139,92,246,0.5);
}

button:active{
    transform:translateY(-1px);
}

.student-card{
    margin-top:20px;
    background:rgba(255,255,255,0.95);
    color:#1e293b;
    border-radius:25px;
    padding:30px;
    animation:fadeUp 0.6s ease;
    box-shadow:0 25px 60px rgba(0,0,0,0.4);
}

.student-card h2{
    color:#7c3aed;
    margin-bottom:8px;
    font-weight:700;
    word-break: break-word;
}

.student-card p{
    margin-bottom:20px;
    font-weight:500;
    color:#475569;
    font-size: 14px;
}

table{
    width:100%;
    border-collapse:collapse;
    border-radius:15px;
    overflow:hidden;
}

th{
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    color:white;
    padding:12px 8px;
    font-size:13px;
    font-weight: 600;
}

td{
    padding:12px 8px;
    text-align:center;
    font-weight:500;
    font-size: 13px;
}

tr:nth-child(even){
    background:#f1f5f9;
}

tr:hover{
    background:#e0e7ff;
    transition:0.3s;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:600;
    color:#facc15;
    font-size: 14px;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

.reset-btn{
    background:linear-gradient(135deg,#ef4444,#f97316);
}

.reset-btn:hover{
    box-shadow:0 15px 30px rgba(239,68,68,0.5);
}

/* Mobile Optimization */
@media(max-width:768px){
    body{
        padding: 15px;
        align-items: flex-start;
    }
    
    .container{
        padding:25px;
        margin-top: 20px;
        border-radius: 20px;
    }
    
    h1{
        font-size:24px;
        margin-bottom:25px;
        letter-spacing: 0.5px;
    }
    
    .search-box{
        flex-direction:column;
        gap:12px;
        margin-bottom:25px;
    }
    
    .input-wrapper{
        min-width: unset;
        width: 100%;
    }
    
    input{
        width:100%;
        font-size: 16px; /* Prevents zoom on iOS */
        padding: 16px 14px 16px 40px;
    }
    
    button{
        width: 100%;
        padding: 16px;
        font-size: 14px;
    }
    
    .student-card{
        padding: 20px;
        border-radius: 20px;
        margin-top: 15px;
    }
    
    .student-card h2{
        font-size: 18px;
        margin-bottom: 12px;
    }
    
    .student-card p{
        font-size: 13px;
        margin-bottom: 15px;
    }
    
    table{
        font-size: 12px;
    }
    
    th, td{
        padding: 10px 6px;
        font-size: 12px;
    }
    
    .message{
        font-size: 13px;
    }
}

@media(max-width:480px){
    body{
        padding: 10px;
    }
    
    .container{
        padding: 18px;
        border-radius: 16px;
    }
    
    h1{
        font-size: 20px;
        margin-bottom: 20px;
    }
    
    .search-box{
        gap: 10px;
    }
    
    input, button{
        font-size: 14px;
        padding: 14px 12px;
    }
    
    input{
        padding-left: 36px;
    }
    
    .input-wrapper i{
        left: 12px;
        font-size: 16px;
    }
    
    .student-card{
        padding: 16px;
    }
    
    .student-card h2{
        font-size: 16px;
    }
    
    .student-card p{
        font-size: 12px;
        line-height: 1.4;
    }
    
    table{
        font-size: 11px;
    }
    
    th, td{
        padding: 8px 4px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎓 TRA CỨU PHÒNG THI DK - Lần 2</h1>

    <div class="search-box">

        <div class="input-wrapper">
            <i>🆔</i>
            <input type="text" id="sbdInput" placeholder="Nhập số báo danh (8 số)">
        </div>
    
        <div class="input-wrapper">
            <i>👤</i>
            <input type="text" id="nameInput" placeholder="Nhập họ và tên">
        </div>
    
        <div class="input-wrapper">
            <i>🏫</i>
            <input type="text" id="classInput" placeholder="Nhập lớp (VD: 12A3)">
        </div>
    
        <button onclick="search()">Tìm kiếm</button>
        <button class="reset-btn" onclick="refreshPage()">Tìm lại</button>
    
    </div>

    <div id="resultArea"></div>
    <div id="message" class="message"></div>
</div>

<script>

let students = [];

pdfjsLib.getDocument("danhsach.pdf").promise.then(pdf => {

    let currentSubject="", currentRoom="", currentSession="", currentDate="";
    let pagePromises=[];

    for(let i=1;i<=pdf.numPages;i++){
        pagePromises.push(
            pdf.getPage(i).then(page =>
                page.getTextContent().then(text=>{

                    let content=text.items.map(s=>s.str).join(" ");
                    let lines=content.split(/(?=Môn:|Phòng|\d{8})/);

                    lines.forEach(line=>{

                        if(line.includes("Môn:")){
                            currentSubject=line.match(/Môn:\s*(.*?)(Phòng|$)/)?.[1]?.trim()||"";
                        }

                        if(line.includes("Phòng")){
                            let roomMatch=line.match(/Phòng\s*(\d+)/);
                            if(roomMatch) currentRoom=roomMatch[1];

                            let dateMatch=line.match(/ngày\s*(\d+\/\d+\/\d+)/);
                            if(dateMatch) currentDate=dateMatch[1];

                            if(line.toLowerCase().includes("chiều")) currentSession="Chiều";
                            if(line.toLowerCase().includes("sáng")) currentSession="Sáng";
                        }

                        if(/^\d{8}/.test(line.trim())){
                            let cleanLine = line.replace(/\u00A0/g, " ").replace(/\s+/g, " ").trim();
                            let parts = cleanLine.split(" ");
                        
                            let sbd = parts[0];
                        
                            let lopIndex = parts.findIndex(p => /^[0-9]{2}A[0-9]+$/.test(p));
                        
                            if(lopIndex !== -1){
                                let lop = parts[lopIndex];
                        
                                let name = parts
                                    .slice(1, lopIndex - 1)
                                    .join(" ")
                                    .replace(/\s+/g, " ")
                                    .trim();
                        
                                students.push({
                                    sbd,
                                    name,
                                    lop,
                                    mon: currentSubject,
                                    phong: currentRoom,
                                    ca: currentSession,
                                    ngay: currentDate
                                });
                            }
                        }
                    });
                })
            )
        );
    }

    Promise.all(pagePromises);
});

function search(){

    const sbd = document.getElementById("sbdInput").value.trim();
    const name = document.getElementById("nameInput").value.trim().toLowerCase();
    const lop = document.getElementById("classInput").value.trim().toLowerCase();

    const resultArea=document.getElementById("resultArea");
    const message=document.getElementById("message");

    resultArea.innerHTML="";
    message.innerHTML="";

    let results=[];

    // Nếu nhập SBD → ưu tiên tìm theo SBD
    if(sbd !== ""){

        if(!/^\d{8}$/.test(sbd)){
            message.innerHTML="⚠ SBD phải gồm 8 chữ số!";
            return;
        }

        results = students.filter(s => s.sbd === sbd);
    }

    // Nếu không nhập SBD → bắt buộc nhập TÊN + LỚP
    else{

        if(name === "" || lop === ""){
            message.innerHTML="⚠ Khi tìm theo họ tên, phải nhập thêm lớp!";
            return;
        }

        results = students.filter(s =>
            s.name.toLowerCase().includes(name) &&
            s.lop.toLowerCase() === lop
        );
    }

    if(results.length===0){
        message.innerHTML="❌ Không tìm thấy thông tin!";
        return;
    }

    const student=results[0];

    let html=`
        <div class="student-card">
            <h2>${student.name}</h2>
            <p><strong>Lớp:</strong> ${student.lop} | <strong>SBD:</strong> ${student.sbd}</p>

            <table>
                <thead>
                    <tr>
                        <th>Môn</th>
                        <th>Phòng</th>
                        <th>Ca</th>
                        <th>Ngày</th>
                    </tr>
                </thead>
                <tbody>
    `;

    results.forEach(s=>{
        html+=`
            <tr>
                <td>${s.mon}</td>
                <td>${s.phong}</td>
                <td>${s.ca}</td>
                <td>${s.ngay}</td>
            </tr>
        `;
    });

    html+=`</tbody></table></div>`;
    resultArea.innerHTML=html;
}

function refreshPage(){
    location.reload();
}

// Allow Enter key to search
document.getElementById("searchInput").addEventListener("keypress", function(e){
    if(e.key === "Enter") search();
});

</script>

</body>
</html>
