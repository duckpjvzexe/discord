<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tra cứu phòng thi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px;
    background: linear-gradient(-45deg,#1e3c72,#2a5298,#6a11cb,#2575fc);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
    overflow-y:auto;
}

@keyframes gradientBG{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    width:100%;
    max-width:850px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    color:white;
    animation:fadeIn 0.8s ease;
}

h1{
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

input{
    padding:14px;
    width:260px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:16px;
    transition:0.3s;
}

input:focus{
    box-shadow:0 0 15px #00f2ff;
    transform:none;
}

button{
    padding:14px 25px;
    border-radius:12px;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    color:white;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 20px #ff4b2b;
}

.loading{
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
    color:#00f2ff;
    animation:pulse 1.5s infinite;
}

.student-card{
    background:white;
    color:#333;
    border-radius:20px;
    padding:25px;
    animation:fadeUp 0.5s ease;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.student-card h2{
    color:#6a11cb;
    margin-bottom:10px;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    min-width:500px;
}

th{
    background:#6a11cb;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f4f4f4;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
    color:#ffd700;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.4;}
}

@media(max-width:600px){
    .container{padding:25px;}
    .search-box{flex-direction:column;}
    input,button{width:100%;}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎓 TRA CỨU PHÒNG THI</h1>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Nhập SBD..." maxlength="8">
        <button onclick="search()">Tìm kiếm</button>
    </div>

    <div id="loading" class="loading">⏳ Đang tải dữ liệu...</div>
    <div id="resultArea"></div>
    <div id="message" class="message"></div>
</div>

<script>

let students = [];
let isLoaded = false;

pdfjsLib.getDocument("danhsach.pdf").promise.then(async pdf => {

    let currentSubject="", currentRoom="", currentSession="", currentDate="";

    for(let i=1;i<=pdf.numPages;i++){

        const page = await pdf.getPage(i);
        const text = await page.getTextContent();

        let rows = {};

        text.items.forEach(item=>{
            let y = Math.round(item.transform[5]);
            if(!rows[y]) rows[y]=[];
            rows[y].push(item.str);
        });

        Object.values(rows).forEach(lineArr=>{

            let line=lineArr.join(" ").trim();

            if(line.includes("Môn:")){
                currentSubject=line.match(/Môn:\s*(.*?)(Phòng|$)/)?.[1]?.trim()||"";
            }

            if(line.includes("Phòng")){
                let roomMatch=line.match(/Phòng\s*(\d+)/);
                if(roomMatch) currentRoom=roomMatch[1];

                let dateMatch=line.match(/ngày\s*(\d+\/\d+\/\d+)/);
                if(dateMatch) currentDate=dateMatch[1];

                if(line.toLowerCase().includes("chiều")) currentSession="Chiều";
                if(line.toLowerCase().includes("sáng")) currentSession="Sáng";
            }

            if(/^\d{8}/.test(line)){
                let parts=line.split(/\s+/);
                let sbd=parts[0];
                let lopIndex=parts.findIndex(p=>/^[0-9]{2}A[0-9]+$/.test(p));

                if(lopIndex!==-1){
                    let lop=parts[lopIndex];
                    let rawName=parts.slice(1,lopIndex).join(" ");

                    let name=rawName
                        .split(" ")
                        .filter((w,i,a)=>w!==a[i-1]) /* fix lặp tên */
                        .join(" ");

                    students.push({
                        sbd,name,lop,
                        mon:currentSubject,
                        phong:currentRoom,
                        ca:currentSession,
                        ngay:currentDate
                    });
                }
            }
        });
    }

    isLoaded=true;
    document.getElementById("loading").style.display="none";
});

function search(){

    if(!isLoaded){
        alert("Dữ liệu chưa tải xong, vui lòng đợi...");
        return;
    }

    const keyword=document.getElementById("searchInput").value.trim();
    const resultArea=document.getElementById("resultArea");
    const message=document.getElementById("message");

    resultArea.innerHTML="";
    message.innerHTML="";

    if(!/^\d{8}$/.test(keyword)){
        message.innerHTML="⚠ Vui lòng nhập đúng 8 chữ số!";
        return;
    }

    const results=students.filter(s=>s.sbd===keyword);

    if(results.length===0){
        message.innerHTML="❌ Không tìm thấy SBD!";
        return;
    }

    const student=results[0];

    let html=`
        <div class="student-card">
            <h2>${student.name}</h2>
            <p><strong>Lớp:</strong> ${student.lop} | <strong>SBD:</strong> ${student.sbd}</p>

            <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Môn</th>
                        <th>Phòng</th>
                        <th>Ca</th>
                        <th>Ngày</th>
                    </tr>
                </thead>
                <tbody>
    `;

    results.forEach(s=>{
        html+=`
            <tr>
                <td>${s.mon}</td>
                <td>${s.phong}</td>
                <td>${s.ca}</td>
                <td>${s.ngay}</td>
            </tr>
        `;
    });

    html+=`</tbody></table></div></div>`;
    resultArea.innerHTML=html;
}

document.getElementById("searchInput")
.addEventListener("keypress",function(e){
    if(e.key==="Enter") search();
});
</script>

</body>
</html>
