<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tra cứu phòng thi DK (THPT VY1)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:20px 15px;
    background: radial-gradient(circle at 20% 30%, #667eea, transparent 40%),
                radial-gradient(circle at 80% 70%, #764ba2, transparent 40%),
                #0f172a;
    overflow-y:auto;
}

.container{
    width:100%;
    max-width:900px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 40px 80px rgba(0,0,0,0.6);
    color:white;
    animation: fadeIn 0.8s ease;
}

h1{
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
    font-weight:700;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.input-wrapper{
    position:relative;
    width:100%;
    max-width:300px;
}

.input-wrapper i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    opacity:0.6;
}

input{
    padding:14px 14px 14px 40px;
    width:100%;
    border-radius:14px;
    border:none;
    outline:none;
    font-size:16px;
    background:rgba(255,255,255,0.1);
    color:white;
    transition:0.3s;
}

input:focus{
    background:rgba(255,255,255,0.2);
    box-shadow:0 0 15px #8b5cf6;
}

button{
    padding:14px 20px;
    border-radius:14px;
    border:none;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    color:white;
    font-size:15px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.reset-btn{
    background:linear-gradient(135deg,#ef4444,#f97316);
}

.student-card{
    margin-top:20px;
    background:rgba(255,255,255,0.95);
    color:#1e293b;
    border-radius:25px;
    padding:25px;
    animation:fadeUp 0.5s ease;
    box-shadow:0 25px 60px rgba(0,0,0,0.4);
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:500px;
}

th{
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
}

tr:nth-child(even){
    background:#f1f5f9;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:600;
    color:#facc15;
}

.loading{
    text-align:center;
    margin-top:15px;
    font-weight:600;
    color:#93c5fd;
    animation:pulse 1.5s infinite;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.4;}
}

@media(max-width:600px){
    .container{padding:25px 20px;}
    h1{font-size:22px;}
    .search-box{flex-direction:column;}
    button{width:100%;}
}
</style>
</head>

<body>

<div class="container">
    <h1>🎓 TRA CỨU PHÒNG THI DK - Lần 2</h1>

    <div class="search-box">
        <div class="input-wrapper">
            <i>🔎</i>
            <input type="text" id="searchInput" placeholder="Nhập số báo danh..." maxlength="8">
        </div>
        <button onclick="search()">Tìm kiếm</button>
        <button class="reset-btn" onclick="resetSearch()">Tìm lại</button>
    </div>

    <div id="loading" class="loading">⏳ Đang tải dữ liệu...</div>
    <div id="resultArea"></div>
    <div id="message" class="message"></div>
</div>

<script>

let students = [];
let isLoaded = false;

pdfjsLib.getDocument("danhsach.pdf").promise.then(async pdf => {

    let currentSubject="", currentRoom="", currentSession="", currentDate="";

    for(let i=1;i<=pdf.numPages;i++){

        const page = await pdf.getPage(i);
        const text = await page.getTextContent();

        let rows = {};

        text.items.forEach(item=>{
            let y = Math.round(item.transform[5]);
            if(!rows[y]) rows[y]=[];
            rows[y].push(item.str);
        });

        Object.values(rows).forEach(lineArr=>{

            let line=lineArr.join(" ").trim();

            if(line.includes("Môn:")){
                currentSubject=line.match(/Môn:\s*(.*?)(Phòng|$)/)?.[1]?.trim()||"";
            }

            if(line.includes("Phòng")){
                let roomMatch=line.match(/Phòng\s*(\d+)/);
                if(roomMatch) currentRoom=roomMatch[1];

                let dateMatch=line.match(/ngày\s*(\d+\/\d+\/\d+)/);
                if(dateMatch) currentDate=dateMatch[1];

                if(line.toLowerCase().includes("chiều")) currentSession="Chiều";
                if(line.toLowerCase().includes("sáng")) currentSession="Sáng";
            }

            if(/^\d{8}/.test(line)){
                let parts=line.split(/\s+/);
                let sbd=parts[0];
                let lopIndex=parts.findIndex(p=>/^[0-9]{2}A[0-9]+$/.test(p));

                if(lopIndex!==-1){
                    let lop=parts[lopIndex];
                    let rawName=parts.slice(1,lopIndex).join(" ");

                    let name=rawName
                        .split(" ")
                        .filter((w,i,a)=>w!==a[i-1])
                        .join(" ");

                    students.push({
                        sbd,name,lop,
                        mon:currentSubject,
                        phong:currentRoom,
                        ca:currentSession,
                        ngay:currentDate
                    });
                }
            }
        });
    }

    isLoaded = true;
    document.getElementById("loading").style.display="none";
});

function search(){

    if(!isLoaded){
        alert("Dữ liệu chưa tải xong, vui lòng đợi...");
        return;
    }

    const keyword=document.getElementById("searchInput").value.trim();
    const resultArea=document.getElementById("resultArea");
    const message=document.getElementById("message");

    resultArea.innerHTML="";
    message.innerHTML="";

    if(!/^\d{8}$/.test(keyword)){
        message.innerHTML="⚠ Vui lòng nhập đúng 8 chữ số!";
        return;
    }

    const results=students.filter(s=>s.sbd===keyword);

    if(results.length===0){
        message.innerHTML="❌ Không tìm thấy SBD!";
        return;
    }

    const student=results[0];

    let html=`
    <div class="student-card">
        <h2>${student.name}</h2>
        <p><strong>Lớp:</strong> ${student.lop} | <strong>SBD:</strong> ${student.sbd}</p>
        <div class="table-wrapper">
        <table>
        <thead>
            <tr>
                <th>Môn</th>
                <th>Phòng</th>
                <th>Ca</th>
                <th>Ngày</th>
            </tr>
        </thead>
        <tbody>
    `;

    results.forEach(s=>{
        html+=`
        <tr>
            <td>${s.mon}</td>
            <td>${s.phong}</td>
            <td>${s.ca}</td>
            <td>${s.ngay}</td>
        </tr>
        `;
    });

    html+=`</tbody></table></div></div>`;
    resultArea.innerHTML=html;
}

function resetSearch(){
    document.getElementById("searchInput").value="";
    document.getElementById("resultArea").innerHTML="";
    document.getElementById("message").innerHTML="";
}

document.getElementById("searchInput")
.addEventListener("keypress",function(e){
    if(e.key==="Enter") search();
});
</script>

</body>
</html>
