<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bảng Xếp Hạng Khối 10 - THPT Việt Yên Số 1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#020817;color:#e2e8f0;min-height:100vh}

.header{background:linear-gradient(135deg,#1e1040 0%,#0f172a 60%,#020817 100%);border-bottom:1px solid rgba(255,255,255,.07);padding:20px 24px}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(90deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:10px}
.header p{color:#64748b;font-size:13px;margin-top:4px}

.loading-area{background:#0f172a;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:28px 24px;margin:20px 24px;display:flex;flex-direction:column;align-items:center;gap:14px}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(124,58,237,.2);border-top-color:#7c3aed;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#94a3b8;font-size:14px;font-weight:500}
.loading-detail{color:#475569;font-size:12px}
.load-items{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.load-item{font-size:12px;padding:3px 10px;border-radius:20px;background:#1e293b;color:#64748b;transition:.3s}
.load-item.ok{background:#064e3b;color:#34d399;border-left:3px solid #10b981}
.load-item.loading{background:#1e1b4b;color:#818cf8;border-left:3px solid #7c3aed}
.load-item.err{background:#450a0a;color:#f87171;border-left:3px solid #ef4444}
.error-box{background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;display:none;margin-top:8px;width:100%;max-width:500px}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:0 24px 16px}
.stat{background:#0f172a;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.stat-icon{font-size:22px}
.stat-num{font-size:20px;font-weight:700;color:#a78bfa}
.stat-lbl{font-size:12px;color:#64748b}

.tabs{display:flex;gap:4px;background:#0f172a;border-radius:12px;padding:4px;width:fit-content;margin:0 24px 16px}
.tab-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:none;color:#64748b;transition:.15s}
.tab-btn.active{background:#7c3aed;color:#fff}
.tab-btn:not(.active):hover{color:#e2e8f0}

.khoi-tabs{display:flex;gap:8px;margin:0 24px 12px;flex-wrap:wrap}
.khoi-tab{flex:1;min-width:140px;padding:12px 16px;border-radius:12px;border:1px solid;cursor:pointer;background:none;text-align:left;transition:.15s}
.khoi-tab.a00{border-color:#4c1d95;color:#c4b5fd}
.khoi-tab.a00.active{background:rgba(109,40,217,.15);border-color:#7c3aed}
.khoi-tab.a01{border-color:#1e3a5f;color:#93c5fd}
.khoi-tab.a01.active{background:rgba(37,99,235,.15);border-color:#3b82f6}
.khoi-tab.d01{border-color:#064e3b;color:#6ee7b7}
.khoi-tab.d01.active{background:rgba(16,185,129,.15);border-color:#10b981}
.khoi-tab:not(.active){color:#64748b;border-color:#1e293b}
.khoi-tab-name{font-size:14px;font-weight:700;display:block}
.khoi-tab-sub{font-size:11px;opacity:.7;margin-top:2px;display:block}

.info-banner{margin:0 24px 12px;padding:14px 18px;border-radius:12px;border:1px solid;display:flex;flex-wrap:wrap;gap:20px;align-items:center}
.info-banner.a00{background:rgba(109,40,217,.08);border-color:rgba(124,58,237,.3)}
.info-banner.a01{background:rgba(37,99,235,.08);border-color:rgba(59,130,246,.3)}
.info-banner.d01{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.3)}
.info-item label{display:block;font-size:11px;color:#64748b;margin-bottom:3px}
.info-item .val{font-size:15px;font-weight:700}
.class-pills{display:flex;flex-wrap:wrap;gap:4px}
.class-pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.class-pill.a00{background:rgba(109,40,217,.4);color:#c4b5fd}
.class-pill.a01{background:rgba(37,99,235,.4);color:#93c5fd}
.class-pill.d01{background:rgba(16,185,129,.4);color:#6ee7b7}

.controls{display:flex;flex-wrap:wrap;gap:8px;margin:0 24px 12px}
select,input[type=text]{background:#0f172a;border:1px solid rgba(255,255,255,.1);color:#e2e8f0;border-radius:8px;padding:7px 12px;font-size:13px;outline:none}
select:focus,input:focus{border-color:#7c3aed}

.table-wrap{margin:0 24px 24px;background:#0f172a;border:1px solid rgba(255,255,255,.06);border-radius:12px;overflow:hidden}
.table-wrap .overflow{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#0d1117;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;font-weight:600;white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:.1s}
tbody tr:hover{background:rgba(124,58,237,.05)}
tbody tr:nth-child(even){background:rgba(255,255,255,.01)}
td{padding:9px 12px;text-align:center;white-space:nowrap}
td.name{text-align:left;font-weight:500;color:#f1f5f9}
td.name.top{color:#fff}

.rank{display:inline-flex;align-items:center;justify-content:center;border-radius:20px;font-size:11px;font-weight:700;min-width:30px;padding:2px 6px}
.rank.r1{background:#fbbf24;color:#78350f}
.rank.r2{background:#cbd5e1;color:#1e293b}
.rank.r3{background:#fb923c;color:#7c2d12}
.rank.rn{background:#1e293b;color:#94a3b8}

.row-1{background:rgba(251,191,36,.04)!important}
.row-2{background:rgba(203,213,225,.04)!important}
.row-3{background:rgba(251,146,60,.04)!important}

.sc-ex{color:#34d399;font-weight:700}
.sc-g{color:#4ade80;font-weight:600}
.sc-ok{color:#60a5fa;font-weight:600}
.sc-av{color:#38bdf8}
.sc-bd{color:#fbbf24}
.sc-f{color:#f87171}
.sc-null{color:#334155}

.tong-ex{color:#34d399;font-size:16px;font-weight:700}
.tong-g{color:#4ade80;font-size:15px;font-weight:700}
.tong-ok{color:#60a5fa;font-weight:700}
.tong-bd{color:#fbbf24;font-weight:600}
.tong-f{color:#f87171}

.lop-tag{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(99,102,241,.2);color:#a5b4fc;border:1px solid rgba(99,102,241,.3)}
.khoi-tag{font-size:11px;padding:2px 7px;border-radius:12px;font-weight:700}
.khoi-tag.A00{background:rgba(109,40,217,.3);color:#c4b5fd}
.khoi-tag.A01{background:rgba(37,99,235,.3);color:#93c5fd}
.khoi-tag.D01{background:rgba(16,185,129,.3);color:#6ee7b7}

.no-data{text-align:center;padding:40px;color:#475569}
.footer-note{text-align:right;font-size:12px;color:#334155;margin-top:6px;padding:0 24px 8px}

.top3-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:0 24px 16px}
.top3-card{background:#0f172a;border-radius:12px;padding:16px;border:1px solid;cursor:pointer;transition:.15s}
.top3-card:hover{transform:scale(1.02)}
.top3-card.r1{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.04)}
.top3-card.r2{border-color:rgba(203,213,225,.2);background:rgba(203,213,225,.03)}
.top3-card.r3{border-color:rgba(251,146,60,.3);background:rgba(251,146,60,.04)}
.top3-card .cn{font-size:18px;font-weight:700;color:#fff;margin-top:4px}
.top3-card .avg{font-size:26px;font-weight:700}
.top3-card .sub-avgs{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:10px}
.top3-card .sub-avgs div{text-align:center}
.top3-card .sub-avgs .sl{font-size:10px;color:#64748b}
.top3-card .sub-avgs .sv{font-size:12px;font-weight:600}

.class-info{margin:0 24px 12px;padding:14px 18px;border-radius:12px;background:rgba(99,102,241,.07);border:1px solid rgba(99,102,241,.2);display:flex;flex-wrap:wrap;gap:20px;align-items:center}
.class-info .ci-item label{font-size:11px;color:#64748b;display:block;margin-bottom:3px}
.class-info .ci-item .cv{font-size:15px;font-weight:700}

@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}.tabs{flex-wrap:wrap}.khoi-tabs{flex-direction:column}}
</style>
</head>
<body>

<div class="header">
  <h1>🏆 Bảng Xếp Hạng Khối 10</h1>
  <p id="subtitle">THPT Việt Yên Số 1 · Đang tải dữ liệu...</p>
</div>

<div class="loading-area" id="loading-area">
  <div class="loading-spinner"></div>
  <div class="loading-text">Đang tải file điểm từ server...</div>
  <div class="load-items" id="load-items">
    <span class="load-item" id="li-toan">📐 Toán</span>
    <span class="load-item" id="li-ly">⚡ Lý</span>
    <span class="load-item" id="li-hoa">🧪 Hóa</span>
    <span class="load-item" id="li-anh">🌐 Anh</span>
    <span class="load-item" id="li-van">📝 Văn</span>
  </div>
  <div class="loading-detail" id="loading-detail">Vui lòng chờ trong giây lát...</div>
  <div class="error-box" id="error-box"></div>
</div>

<div id="main" style="display:none">
  <div class="stats" id="stats"></div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('khoi',this)">🎯 Xếp hạng theo khối</button>
    <button class="tab-btn" onclick="switchTab('all',this)">📋 Tất cả học sinh</button>
    <button class="tab-btn" onclick="switchTab('class',this)">🏫 Xếp hạng lớp</button>
  </div>

  <div id="tab-khoi">
    <div class="khoi-tabs">
      <button class="khoi-tab a00 active" onclick="switchKhoi('A00',this)">
        <span class="khoi-tab-name">Khối A00</span>
        <span class="khoi-tab-sub" id="khoi-sub-A00">Toán + Lý + Hóa</span>
      </button>
      <button class="khoi-tab a01" onclick="switchKhoi('A01',this)">
        <span class="khoi-tab-name">Khối A01</span>
        <span class="khoi-tab-sub" id="khoi-sub-A01">Toán + Lý + Anh</span>
      </button>
      <button class="khoi-tab d01" onclick="switchKhoi('D01',this)">
        <span class="khoi-tab-name">Khối D01</span>
        <span class="khoi-tab-sub" id="khoi-sub-D01">Toán + Văn + Anh</span>
      </button>
    </div>
    <div id="khoi-banner"></div>
    <div class="controls">
      <input type="text" id="search-khoi" placeholder="🔍 Tìm tên học sinh..." oninput="renderKhoi()" style="min-width:200px">
    </div>
    <div class="table-wrap"><div class="overflow"><table id="tbl-khoi"></table></div></div>
  </div>

  <div id="tab-all" style="display:none">
    <div class="controls">
      <select id="sel-class" onchange="renderAll()"><option value="">🏫 Tất cả lớp</option></select>
      <select id="sel-khoi-filter" onchange="renderAll()">
        <option value="">🎯 Tất cả khối</option>
        <option value="A00">Khối A00</option>
        <option value="A01">Khối A01</option>
        <option value="D01">Khối D01</option>
      </select>
      <input type="text" id="search-all" placeholder="🔍 Tìm tên..." oninput="renderAll()" style="min-width:180px">
      <select id="sort-all" onchange="renderAll()">
        <option value="tongKhoi">Sắp xếp: Tổng 3 môn</option>
        <option value="avg">Sắp xếp: ĐTB 5 môn</option>
        <option value="toan">Sắp xếp: Toán</option>
        <option value="ly">Sắp xếp: Lý</option>
        <option value="hoa">Sắp xếp: Hóa</option>
        <option value="anh">Sắp xếp: Anh</option>
        <option value="van">Sắp xếp: Văn</option>
      </select>
    </div>
    <div id="class-info-panel" style="display:none" class="class-info"></div>
    <div class="table-wrap"><div class="overflow"><table id="tbl-all"></table></div></div>
    <div class="footer-note" id="all-count"></div>
  </div>

  <div id="tab-class" style="display:none">
    <div class="top3-grid" id="top3-cards"></div>
    <div class="table-wrap"><div class="overflow"><table id="tbl-class"></table></div></div>
    <p style="font-size:12px;color:#334155;text-align:right;padding:6px 24px">Nhấn vào lớp để xem chi tiết học sinh</p>
  </div>
</div>

<script>
const FILE_URLS = {
  toan: 'Toan.xlsx',
  ly:   'Ly.xlsx',
  hoa:  'Hoa.xlsx',
  anh:  'Anh.xlsx',
  van:  'Van.xls',
};

const KHOI_CONFIG = {
  A00: { label:'Khối A00', subjects:['toan','ly','hoa'], labels:['Toán','Lý','Hóa'], cls:'a00', color:'#a78bfa' },
  A01: { label:'Khối A01', subjects:['toan','ly','anh'], labels:['Toán','Lý','Anh'], cls:'a01', color:'#93c5fd' },
  D01: { label:'Khối D01', subjects:['toan','van','anh'], labels:['Toán','Văn','Anh'], cls:'d01', color:'#6ee7b7' },
};

const ALL_SUBS = [
  {key:'toan',label:'Toán'},{key:'ly',label:'Lý'},{key:'hoa',label:'Hóa'},
  {key:'anh',label:'Anh'},{key:'van',label:'Văn'}
];

function getKhoi(lop){
  const m = lop.match(/\d+[Aa](\d+)/);
  if(!m) return null;
  const n = parseInt(m[1]);
  if(n<=2) return 'A00';
  if(n<=8) return 'A01';
  return 'D01';
}

let students = [];
let classStats = [];
let currentKhoi = 'A00';
let currentTab = 'khoi';

window.addEventListener('DOMContentLoaded', autoLoad);

async function autoLoad() {
  window._rawMap = {};
  document.getElementById('error-box').innerHTML = '';
  document.getElementById('error-box').style.display = 'none';

  const subjectIds = {toan:'li-toan',ly:'li-ly',hoa:'li-hoa',anh:'li-anh',van:'li-van'};
  let anySuccess = false;

  for (const [subject, url] of Object.entries(FILE_URLS)) {
    const el = document.getElementById(subjectIds[subject]);
    if (el) el.className = 'load-item loading';
    document.getElementById('loading-detail').textContent = 'Đang tải: ' + subLabel(subject) + '...';

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const buf = await res.arrayBuffer();
      const wb = XLSX.read(new Uint8Array(buf), {type:'array'});
      const raw = findDataSheet(wb);
      if (!raw) throw new Error('Không tìm được dữ liệu');
      const hi = findHeaderRow(raw);
      if (hi < 0) throw new Error('Không tìm được tiêu đề');

      const headers = raw[hi].map(h=>String(h).trim().toLowerCase());
      const nameIdx = headers.findIndex(h=>h.includes('họ')&&(h.includes('tên')||h.includes('ten')));
      const scoreIdx = headers.findIndex(h=>/^điểm$|^diem$|đi[eê]m/.test(h));
      const classIdx = headers.findIndex(h=>h.includes('lớp')||h.includes('lop')||h.includes('ghi chú')||h.includes('ghi chu'));
      if (nameIdx<0||scoreIdx<0) throw new Error('Không tìm được cột Họ tên/Điểm');

      for (let r=hi+1; r<raw.length; r++) {
        const row = raw[r];
        const name = row[nameIdx]?String(row[nameIdx]).trim().replace(/\s+/g,' '):'';
        if (!name||/tổng|cộng/i.test(name)) continue;
        const score = parseFloat(String(row[scoreIdx]).replace(',','.'));
        if (isNaN(score)) continue;
        let lop = classIdx>=0?String(row[classIdx]||'').trim():'';
        if (/^\d$/.test(lop)) lop='';
        const key = name+'|'+lop;
        if (!window._rawMap[key]) window._rawMap[key]={name,lop,toan:null,ly:null,hoa:null,anh:null,van:null};
        window._rawMap[key][subject]=score;
      }

      if (el) el.className = 'load-item ok';
      anySuccess = true;
    } catch(err) {
      if (el) el.className = 'load-item err';
      showError('Lỗi tải ' + subLabel(subject) + ': ' + err.message);
    }
  }

  document.getElementById('loading-detail').textContent = 'Hoàn tất! Đang xử lý dữ liệu...';
  await new Promise(r => setTimeout(r, 300));

  if (anySuccess) {
    buildData();
  } else {
    document.getElementById('loading-detail').textContent = 'Không tải được file nào. Vui lòng kiểm tra lại server.';
  }
}

function findDataSheet(wb){
  for(const name of wb.SheetNames){
    const sheet = wb.Sheets[name];
    const raw = XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
    for(const row of raw.slice(0,10)){
      const rs = row.join('|').toLowerCase();
      if(rs.includes('họ')&&(rs.includes('tên')||rs.includes('ten'))) return raw;
    }
  }
  return null;
}

function findHeaderRow(raw){
  for(let i=0;i<Math.min(raw.length,15);i++){
    const rs = raw[i].join('|').toLowerCase();
    if(rs.includes('họ')&&(rs.includes('tên')||rs.includes('ten'))) return i;
  }
  return -1;
}

function subLabel(s){ return {toan:'Toán',ly:'Lý',hoa:'Hóa',anh:'Anh',van:'Văn'}[s]||s; }

function showError(msg){
  const el=document.getElementById('error-box');
  el.innerHTML+='⚠️ '+msg+'<br>';
  el.style.display='block';
}

function buildData(){
  const raw = Object.values(window._rawMap||{});
  if(!raw.length){showError('Không có dữ liệu.');return;}

  const withExtra = raw.map(s=>{
    const scores = ALL_SUBS.map(x=>s[x.key]).filter(v=>v!==null&&!isNaN(v));
    const avg = scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0;
    const khoi = getKhoi(s.lop);
    let tongKhoi = null;
    if(khoi){
      const subs = KHOI_CONFIG[khoi].subjects;
      const vals = subs.map(sub=>s[sub]).filter(v=>v!==null&&!isNaN(v));
      if(vals.length===subs.length) tongKhoi = parseFloat(vals.reduce((a,b)=>a+b,0).toFixed(2));
    }
    return {...s,avg,khoi,tongKhoi,gradeRank:0,classRank:0,khoiRank:0};
  });

  const byAvg = [...withExtra].sort((a,b)=>b.avg-a.avg);
  let gr=1;
  for(let i=0;i<byAvg.length;i++){
    if(i>0&&byAvg[i].avg!==byAvg[i-1].avg) gr=i+1;
    byAvg[i].gradeRank=gr;
  }

  const byClass={};
  for(const s of byAvg){
    if(!byClass[s.lop]) byClass[s.lop]=[];
    byClass[s.lop].push(s);
  }
  for(const lop of Object.keys(byClass)){
    const arr=[...byClass[lop]].sort((a,b)=>b.avg-a.avg);
    let cr=1;
    for(let i=0;i<arr.length;i++){
      if(i>0&&arr[i].avg!==arr[i-1].avg) cr=i+1;
      const s=withExtra.find(x=>x.name===arr[i].name&&x.lop===arr[i].lop);
      if(s) s.classRank=cr;
    }
  }

  const byKhoi={};
  for(const s of withExtra){
    if(s.khoi&&s.tongKhoi!==null){
      if(!byKhoi[s.khoi]) byKhoi[s.khoi]=[];
      byKhoi[s.khoi].push(s);
    }
  }
  for(const k of Object.keys(byKhoi)){
    const arr=[...byKhoi[k]].sort((a,b)=>b.tongKhoi-a.tongKhoi);
    let kr=1;
    for(let i=0;i<arr.length;i++){
      if(i>0&&arr[i].tongKhoi!==arr[i-1].tongKhoi) kr=i+1;
      arr[i].khoiRank=kr;
    }
  }

  students=[...withExtra];

  classStats=[];
  for(const lop of Object.keys(byClass)){
    const arr=byClass[lop];
    const khoi=getKhoi(lop);
    const subAvg=sub=>{
      const vals=arr.map(s=>s[sub]).filter(v=>v!==null&&!isNaN(v));
      return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
    };
    const cavg=arr.reduce((a,b)=>a+b.avg,0)/arr.length;
    const tongKhoiVals=arr.map(s=>s.tongKhoi).filter(v=>v!==null);
    const tongKhoiAvg=tongKhoiVals.length?tongKhoiVals.reduce((a,b)=>a+b,0)/tongKhoiVals.length:0;
    classStats.push({lop,khoi,avg:cavg,tongKhoiAvg,count:arr.length,rank:0,khoiClassRank:0,toan:subAvg('toan'),ly:subAvg('ly'),hoa:subAvg('hoa'),anh:subAvg('anh'),van:subAvg('van')});
  }

  classStats.sort((a,b)=>b.avg-a.avg);
  let csr=1;
  for(let i=0;i<classStats.length;i++){
    if(i>0&&classStats[i].avg!==classStats[i-1].avg) csr=i+1;
    classStats[i].rank=csr;
  }
  for(const k of ['A00','A01','D01']){
    const kc=[...classStats.filter(c=>c.khoi===k)].sort((a,b)=>b.tongKhoiAvg-a.tongKhoiAvg);
    let kr2=1;
    for(let i=0;i<kc.length;i++){
      if(i>0&&kc[i].tongKhoiAvg!==kc[i-1].tongKhoiAvg) kr2=i+1;
      const idx=classStats.findIndex(c=>c.lop===kc[i].lop);
      if(idx>=0) classStats[idx].khoiClassRank=kr2;
    }
  }

  const classes=[...new Set(students.map(s=>s.lop).filter(Boolean))].sort();
  const sel=document.getElementById('sel-class');
  sel.innerHTML='<option value="">🏫 Tất cả lớp</option>';
  classes.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});

  for(const [k,cfg] of Object.entries(KHOI_CONFIG)){
    const cnt=students.filter(s=>s.khoi===k).length;
    document.getElementById('khoi-sub-'+k).textContent=cfg.labels.join(' + ')+' · '+cnt+' hs';
  }

  document.getElementById('subtitle').textContent='THPT Việt Yên Số 1 · '+students.length+' học sinh · '+classes.length+' lớp';
  document.getElementById('stats').innerHTML=[
    {icon:'👥',num:students.length,lbl:'Tổng học sinh'},
    {icon:'🏫',num:classes.length,lbl:'Số lớp'},
    {icon:'⭐',num:(students.slice().sort((a,b)=>b.avg-a.avg)[0]?.avg.toFixed(2)||'—'),lbl:'ĐTB cao nhất'},
    {icon:'🥇',num:(classStats[0]?.lop||'—'),lbl:'Lớp dẫn đầu'},
  ].map(s=>`<div class="stat"><span class="stat-icon">${s.icon}</span><div><div class="stat-num">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div></div>`).join('');

  document.getElementById('loading-area').style.display='none';
  document.getElementById('main').style.display='block';
  currentKhoi='A00';
  switchKhoiTab('A00');
  renderKhoi();
  renderAll();
  renderClass();
}

function switchTab(tab, btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['khoi','all','class'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
}

function switchKhoi(k, btn){
  currentKhoi=k;
  document.querySelectorAll('.khoi-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('search-khoi').value='';
  renderKhoi();
}

function switchKhoiTab(k){
  currentKhoi=k;
  document.querySelectorAll('.khoi-tab').forEach(b=>{
    b.classList.remove('active');
    if(b.textContent.includes('Khối '+k)) b.classList.add('active');
  });
}

function renderKhoi(){
  const cfg=KHOI_CONFIG[currentKhoi];
  const c=currentKhoi==='A00'?'a00':currentKhoi==='A01'?'a01':'d01';
  const search=document.getElementById('search-khoi').value.toLowerCase().normalize('NFC');

  const kClasses=classStats.filter(cs=>cs.khoi===currentKhoi).sort((a,b)=>b.tongKhoiAvg-a.tongKhoiAvg);
  const kAvg=kClasses.length?(kClasses.reduce((a,b)=>a+b.tongKhoiAvg,0)/kClasses.length).toFixed(2):'—';
  document.getElementById('khoi-banner').innerHTML=`
    <div class="info-banner ${c}">
      <div class="info-item"><label>3 môn xét</label><div class="val" style="color:${cfg.color}">${cfg.labels.join(' · ')}</div></div>
      <div class="info-item"><label>Các lớp</label><div class="class-pills">${kClasses.map(cs=>`<span class="class-pill ${c}">${cs.lop}</span>`).join('')}</div></div>
      <div class="info-item" style="margin-left:auto"><label>TB tổng điểm khối</label><div class="val" style="color:${cfg.color};font-size:22px">${kAvg}</div></div>
    </div>`;

  const allInKhoi=students.filter(s=>s.khoi===currentKhoi&&(!search||s.name.toLowerCase().normalize('NFC').includes(search)));
  const ranked=allInKhoi.filter(s=>s.tongKhoi!==null).sort((a,b)=>b.tongKhoi-a.tongKhoi);
  const unranked=allInKhoi.filter(s=>s.tongKhoi===null).sort((a,b)=>a.name.localeCompare(b.name,'vi'));
  const rows=[...ranked,...unranked];

  let html=`<thead><tr>
    <th>HẠNG</th><th style="text-align:left">HỌ VÀ TÊN</th><th>LỚP</th>
    ${cfg.labels.map(l=>`<th>${l.toUpperCase()}</th>`).join('')}
    <th style="color:#fbbf24">TỔNG 3 MÔN</th>
  </tr></thead><tbody>`;

  if(!rows.length){html+='<tr><td colspan="7" class="no-data">Không có dữ liệu</td></tr>';}
  else{
    rows.forEach((s)=>{
      const rc=s.khoiRank===1?'row-1':s.khoiRank===2?'row-2':s.khoiRank===3?'row-3':'';
      html+=`<tr class="${rc}">
        <td>${rankBadge(s.khoiRank)}</td>
        <td class="name ${s.khoiRank<=3?'top':''}">${s.name}</td>
        <td><span class="lop-tag">${s.lop}</span></td>
        ${cfg.subjects.map(sub=>`<td class="${scoreClass(s[sub])}">${s[sub]!==null?s[sub].toFixed(2):'—'}</td>`).join('')}
        <td><span class="${tongClass(s.tongKhoi)}">${s.tongKhoi!==null?s.tongKhoi.toFixed(2):'—'}</span></td>
      </tr>`;
    });
  }
  html+='</tbody>';
  document.getElementById('tbl-khoi').innerHTML=html;
}

function renderAll(){
  const selClass=document.getElementById('sel-class').value;
  const selKhoi=document.getElementById('sel-khoi-filter').value;
  const search=document.getElementById('search-all').value.toLowerCase().normalize('NFC');
  const sortBy=document.getElementById('sort-all').value;

  let arr=[...students];
  if(selClass) arr=arr.filter(s=>s.lop===selClass);
  if(selKhoi) arr=arr.filter(s=>s.khoi===selKhoi);
  if(search) arr=arr.filter(s=>s.name.toLowerCase().normalize('NFC').includes(search));

  if(sortBy==='tongKhoi') arr.sort((a,b)=>(b.tongKhoi??-1)-(a.tongKhoi??-1));
  else if(sortBy==='avg') arr.sort((a,b)=>b.avg-a.avg);
  else arr.sort((a,b)=>(b[sortBy]??-1)-(a[sortBy]??-1));

  const panel=document.getElementById('class-info-panel');
  if(selClass){
    const cs=classStats.find(c=>c.lop===selClass);
    if(cs){
      const k=cs.khoi;
      panel.style.display='flex';
      panel.innerHTML=`
        <div class="ci-item"><label>Lớp</label><div class="cv" style="font-size:20px">${cs.lop}</div></div>
        ${k?`<div class="ci-item"><label>Khối</label><span class="khoi-tag ${k}">${k}</span></div>`:''}
        <div class="ci-item"><label>Hạng toàn khối</label>${rankBadge(cs.rank)}</div>
        ${k?`<div class="ci-item"><label>Hạng trong ${k}</label>${rankBadge(cs.khoiClassRank)}</div>`:''}
        <div class="ci-item"><label>TB tổng 3 môn</label><span class="${tongClass(cs.tongKhoiAvg)}" style="font-size:18px">${cs.tongKhoiAvg.toFixed(2)}</span></div>
        <div class="ci-item"><label>ĐTB 5 môn</label><span class="${avgClass(cs.avg)}" style="font-size:18px">${cs.avg.toFixed(2)}</span></div>
      `;
    }
  } else {
    panel.style.display='none';
  }

  const isClassView=!!selClass;
  let html=`<thead><tr>
    ${isClassView?'<th>HẠNG LỚP</th>':''}
    <th>HẠNG KHỐI</th>
    <th style="text-align:left">HỌ VÀ TÊN</th>
    ${!isClassView?'<th>LỚP</th><th>KHỐI</th>':''}
    ${ALL_SUBS.map(s=>`<th>${s.label.toUpperCase()}</th>`).join('')}
    <th style="color:#fbbf24">TỔNG 3 MÔN</th>
    <th style="color:#a78bfa">TB 5 MÔN</th>
  </tr></thead><tbody>`;

  if(!arr.length) html+='<tr><td colspan="10" class="no-data">Không tìm thấy học sinh nào</td></tr>';
  else{
    arr.forEach((s)=>{
      const rc=s.gradeRank===1?'row-1':s.gradeRank===2?'row-2':s.gradeRank===3?'row-3':'';
      html+=`<tr class="${rc}">
        ${isClassView?`<td>${rankBadge(s.classRank)}</td>`:''}
        <td>${rankBadge(s.gradeRank)}</td>
        <td class="name ${s.gradeRank<=3?'top':''}">${s.name}</td>
        ${!isClassView?`<td><span class="lop-tag">${s.lop}</span></td><td>${s.khoi?`<span class="khoi-tag ${s.khoi}">${s.khoi}</span>`:'—'}</td>`:''}
        ${ALL_SUBS.map(x=>`<td class="${scoreClass(s[x.key])}">${s[x.key]!==null?s[x.key].toFixed(2):'—'}</td>`).join('')}
        <td><span class="${tongClass(s.tongKhoi)}">${s.tongKhoi!==null?s.tongKhoi.toFixed(2):'—'}</span></td>
        <td class="${avgClass(s.avg)}" style="font-weight:700">${s.avg.toFixed(2)}</td>
      </tr>`;
    });
  }
  html+='</tbody>';
  document.getElementById('tbl-all').innerHTML=html;
  document.getElementById('all-count').textContent='Hiển thị '+arr.length+' / '+students.length+' học sinh';
}

function renderClass(){
  const top3=classStats.slice(0,3);
  document.getElementById('top3-cards').innerHTML=top3.map(cs=>{
    const rc=cs.rank===1?'r1':cs.rank===2?'r2':'r3';
    const k=cs.khoi;
    return `<div class="top3-card ${rc}" onclick="goToClass('${cs.lop}')">
      <div style="font-size:22px">${cs.rank===1?'🥇':cs.rank===2?'🥈':'🥉'}</div>
      <div class="cn">Lớp ${cs.lop} ${k?`<span class="khoi-tag ${k}" style="font-size:11px">${k}</span>`:''}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:6px">
        <div><div class="avg ${avgClass(cs.avg)}">${cs.avg.toFixed(2)}</div><div style="font-size:11px;color:#64748b">ĐTB 5 môn</div></div>
        <div style="text-align:right"><div class="${tongClass(cs.tongKhoiAvg)}" style="font-size:18px;font-weight:700">${cs.tongKhoiAvg.toFixed(2)}</div><div style="font-size:11px;color:#64748b">TB tổng 3 môn</div></div>
      </div>
      <div class="sub-avgs">${ALL_SUBS.map(s=>`<div><div class="sl">${s.label}</div><div class="sv ${scoreClass(cs[s.key])}">${cs[s.key].toFixed(1)}</div></div>`).join('')}</div>
    </div>`;
  }).join('');

  let html=`<thead><tr>
    <th>HẠNG</th><th style="text-align:left">LỚP</th><th>KHỐI</th><th>HẠNG KHỐI</th><th>SĨ SỐ</th>
    ${ALL_SUBS.map(s=>`<th>TB ${s.label.toUpperCase()}</th>`).join('')}
    <th style="color:#fbbf24">TB TỔNG 3 MÔN</th>
    <th style="color:#a78bfa">TB 5 MÔN</th>
  </tr></thead><tbody>`;

  classStats.forEach((cs)=>{
    const k=cs.khoi;
    html+=`<tr onclick="goToClass('${cs.lop}')" style="cursor:pointer">
      <td>${rankBadge(cs.rank)}</td>
      <td class="name" style="font-weight:700">${cs.lop}</td>
      <td>${k?`<span class="khoi-tag ${k}">${k}</span>`:'—'}</td>
      <td>${cs.khoiClassRank>0?rankBadge(cs.khoiClassRank):'—'}</td>
      <td style="color:#94a3b8">${cs.count}</td>
      ${ALL_SUBS.map(s=>`<td class="${scoreClass(cs[s.key])}">${cs[s.key].toFixed(2)}</td>`).join('')}
      <td><span class="${tongClass(cs.tongKhoiAvg)}" style="font-weight:700">${cs.tongKhoiAvg.toFixed(2)}</span></td>
      <td class="${avgClass(cs.avg)}" style="font-weight:700">${cs.avg.toFixed(2)}</td>
    </tr>`;
  });
  html+='</tbody>';
  document.getElementById('tbl-class').innerHTML=html;
}

function goToClass(lop){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===1));
  ['khoi','all','class'].forEach(t=>document.getElementById('tab-'+t).style.display=t==='all'?'':'none');
  document.getElementById('sel-class').value=lop;
  document.getElementById('sel-khoi-filter').value='';
  document.getElementById('search-all').value='';
  currentTab='all';
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}

function rankBadge(r){
  if(r===1) return '<span class="rank r1">🥇</span>';
  if(r===2) return '<span class="rank r2">🥈</span>';
  if(r===3) return '<span class="rank r3">🥉</span>';
  if(!r||r<=0) return '<span class="rank rn" style="color:#475569">—</span>';
  return `<span class="rank rn">${r}</span>`;
}

function scoreClass(v){
  if(v===null||v===undefined) return 'sc-null';
  if(v>=9) return 'sc-ex';
  if(v>=8) return 'sc-g';
  if(v>=7) return 'sc-ok';
  if(v>=6.5) return 'sc-av';
  if(v>=5) return 'sc-bd';
  return 'sc-f';
}

function tongClass(v){
  if(v===null||v===undefined) return 'sc-null';
  if(v>=27) return 'tong-ex';
  if(v>=24) return 'tong-g';
  if(v>=21) return 'tong-ok';
  if(v>=15) return 'tong-bd';
  return 'tong-f';
}

function avgClass(v){
  if(v>=8.5) return 'sc-ex';
  if(v>=7.5) return 'sc-g';
  if(v>=6.5) return 'sc-ok';
  if(v>=5) return 'sc-bd';
  return 'sc-f';
}
</script>
</body>
</html>
